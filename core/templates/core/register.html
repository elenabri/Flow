<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация | TubeFlow</title>
    <style>
        :root { 
            --primary: #0071e3; 
            --border: #d2d2d7;
            --text-main: #1d1d1f;
            --text-label: #86868b;
            --error: #ff3b30;
            --bg-light: #f5f5f7;
            --text-dark: #1d1d1f;
        }

        body { background: white; margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .register-wrapper { padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .back-nav { width: 100%; max-width: 600px; margin-bottom: 20px; }
        .btn-back { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 15px; font-weight: 500; padding: 0; }

        .register-card { width: 100%; max-width: 600px; background: white; border-radius: 20px; box-sizing: border-box; }
        .register-header { text-align: left; margin-bottom: 30px; }
        .register-header h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        #header-desc { color: var(--text-label); margin-top: 8px; font-size: 15px; }

        .role-options { display: flex; gap: 10px; margin-bottom: 30px; }
        .role-option { flex: 1; cursor: pointer; display: flex; }
        .role-radio { display: none; }
        .role-box { 
            flex: 1; padding: 16px 10px; border: 1px solid var(--border); border-radius: 14px; 
            text-align: center; font-weight: 600; color: var(--text-main); transition: 0.2s;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        .role-radio:checked + .role-box { border-color: var(--primary); background: var(--primary); color: white; }

        .section-label { 
            font-size: 12px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 0.5px; color: var(--text-label); 
            margin: 35px 0 15px 0; display: block; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px;
        }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .form-group label { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        
        input[type="text"], input[type="email"], input[type="url"], input[type="number"], textarea { 
            width: 100%; padding: 14px; border: 1px solid var(--border); 
            border-radius: 12px; box-sizing: border-box; font-size: 16px;
            transition: 0.2s; outline: none; background: #fff;
        }
        input:focus { border-color: var(--primary); }
        input.invalid { border-color: var(--error); background: #fff8f8; }

        .price-container { background: #f5f5f7; padding: 16px; border-radius: 18px; margin-bottom: 20px; }
        .price-group-title { font-size: 11px; font-weight: 800; color: var(--text-label); margin-bottom: 12px; text-transform: uppercase; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .price-item label { font-size: 12px !important; margin-bottom: 4px; display: block; color: var(--text-label); }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .cat-item input { display: none; }
        .cat-btn { 
            padding: 12px; border: 1px solid var(--border); border-radius: 12px; 
            font-size: 13px; text-align: center; background: #fff; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .cat-item input:checked + .cat-btn { border-color: var(--primary); background: #e8f3ff; color: var(--primary); }

        .sub-topics-container { 
            margin-top: 20px; padding: 20px; background: #f9f9fb; 
            border-radius: 18px; display: none; border: 1px solid #eee;
        }
        .sub-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .sub-tag { 
            padding: 8px 16px; background: white; border: 1px solid var(--border); 
            border-radius: 20px; font-size: 13px; cursor: pointer;
        }
        .sub-tag.active { background: var(--primary); color: white; border-color: var(--primary); }

        .file-zone {
            border: 2px dashed var(--border); border-radius: 14px; padding: 25px;
            text-align: center; cursor: pointer; background: #fff; color: var(--text-label); font-size: 14px;
        }

        .btn-submit { width: 100%; margin-top: 30px; padding: 18px; background: var(--text-dark); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.3s; }
        #api-status { display: none; margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 14px; }

        @media (max-width: 480px) {
            .price-grid { grid-template-columns: 1fr; }
            .category-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <nav class="back-nav">
        <button onclick="window.history.back()" class="btn-back">← Назад</button>
    </nav>

    <div class="register-card">
        <div class="register-header">
            <h2>Регистрация</h2>
            <p id="header-desc">Создайте аккаунт в TubeFlow</p>
        </div>

        <form method="post" id="reg-form" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" name="api_channel_name" id="id_api_name">
            <input type="hidden" name="api_subs" id="id_api_subs">
            <input type="hidden" name="sub_topics" id="id_sub_topics_json">

            <div class="role-selection">
                <div class="role-options">
                    <label class="role-option">
                        <input type="radio" name="role" value="blogger" class="role-radio" checked>
                        <div class="role-box">Я Блогер</div>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="advertiser" class="role-radio">
                        <div class="role-box">Я Рекламодатель</div>
                    </label>
                </div>
            </div>

            <div id="hidden-content">
                <div class="form-group">
                    <label>E-mail для связи</label>
                    <input type="email" name="email" placeholder="mail@example.com" required>
                </div>

                <!-- БЛОГЕР -->
                <div id="blogger-fields">
                    <div class="form-group">
                        <label>YouTube канал</label>
                        <input type="text" name="channel_link" placeholder="@channel_name" required>
                    </div>
                    <label class="section-label">Стоимость вашей рекламы</label>
                    <div class="price-container">
                        <div class="price-group-title">Long ролики</div>
                        <div class="price-grid">
                            <div class="price-item"><label>Начало</label><input type="number" name="price_start" placeholder="₽" required></div>
                            <div class="price-item"><label>Середина</label><input type="number" name="price_middle" placeholder="₽" required></div>
                        </div>
                        <div class="price-group-title">Shorts</div>
                        <div class="price-item"><input type="number" name="price_shorts" placeholder="₽" required></div>
                    </div>
                </div>

                <!-- РЕКЛАМОДАТЕЛЬ -->
                <div id="advertiser-fields" style="display:none;">
                    <label class="section-label">О бренде и продукте</label>
                    <div class="form-group">
                        <label>Бренд</label>
                        <input type="text" name="company_name" placeholder="Напр: Вкусневич" required>
                    </div>
                    <div class="form-group">
                        <label>Продукт</label>
                        <input type="text" name="title" placeholder="Напр: Паштет из утки" required>
                    </div>
                    <!-- ТО САМОЕ НОВОЕ ПОЛЕ -->
                    <div class="form-group">
                        <label>Краткое описание (УТП)</label>
                        <input type="text" name="short_description" id="short_desc" 
                               placeholder="Макс. 30 символов" 
                               maxlength="30" required 
                               oninput="updateCount()">
                        <small id="char-count" style="color: var(--text-label); font-size: 11px; margin-top: 4px; text-align: right;">
                            Осталось: 30 симв.
                        </small>
                    </div>
                    <div class="form-group">
                        <label>Фото продукта</label>
                        <div class="file-zone" id="drop-zone" onclick="document.getElementById('id_product_image').click()">
                            <span id="file-name">Нажмите для загрузки</span>
                            <input type="file" name="product_image" id="id_product_image" style="display:none;" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ТЗ</label>
                        <textarea name="description" placeholder="Что нужно сказать?" required></textarea>
                    </div>
                </div>

                <label class="section-label">Категории</label>
                <div class="category-grid">
                    {% for value, text in form.topics.field.choices %}
                        <label class="cat-item">
                            <input type="checkbox" name="topics" value="{{ value }}" onchange="renderSubTopics()">
                            <div class="cat-btn">{{ text }}</div>
                        </label>
                    {% endfor %}
                </div>

                <div id="sub-area" class="sub-topics-container">
                    <div id="sub-grid" class="sub-grid"></div>
                </div>

                <div id="api-status"></div>
                <button type="button" id="submit-handler" class="btn-submit">Создать профиль</button>
            </div>
        </form>
    </div>
</div>

<script>
    function updateCount() {
        const input = document.getElementById('short_desc');
        const count = document.getElementById('char-count');
        const remaining = 30 - input.value.length;
        count.innerText = `Осталось: ${remaining} симв.`;
        count.style.color = remaining <= 5 ? 'var(--error)' : 'var(--text-label)';
    }

    function toggleRole(v) {
        document.getElementById('blogger-fields').style.display = v === 'blogger' ? 'block' : 'none';
        document.getElementById('advertiser-fields').style.display = v === 'advertiser' ? 'block' : 'none';
        
        document.querySelectorAll('#advertiser-fields input, #advertiser-fields textarea').forEach(el => el.required = (v === 'advertiser'));
        document.querySelectorAll('#blogger-fields input').forEach(el => el.required = (v === 'blogger'));
    }

    document.querySelectorAll('.role-radio').forEach(r => r.addEventListener('change', () => toggleRole(r.value)));

    document.getElementById('id_product_image')?.addEventListener('change', (e) => {
        document.getElementById('file-name').innerText = e.target.files[0] ? e.target.files[0].name : "Нажмите для загрузки";
    });

    document.getElementById('submit-handler').addEventListener('click', () => {
        const form = document.getElementById('reg-form');
        let isValid = true;
        const visibleFields = document.querySelectorAll(`#hidden-content input[required]:not([type="radio"]), #hidden-content textarea[required]`);
        
        visibleFields.forEach(field => {
            if (field.closest('#blogger-fields, #advertiser-fields')?.style.display === 'none') return;
            if (!field.value.trim()) {
                field.classList.add('invalid');
                isValid = false;
            } else {
                field.classList.remove('invalid');
            }
        });

        if (isValid) form.submit();
        else alert("Заполните обязательные поля");
    });
</script>

</body>
</html>
