{% extends "core/base.html" %}

{% block content %}
<style>
    :root {
        --primary: #2563eb;
        --success: #10b981;
        --border-color: #e2e8f0;
        --text-main: #1e293b;
        --bg-body: #f8fafc;
    }

    .edit-wrapper {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: 'Inter', sans-serif;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #64748b;
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 20px;
        transition: color 0.2s;
    }

    .back-link:hover { color: var(--primary); }

    .edit-card {
        background: white;
        border-radius: 24px;
        border: 1px solid var(--border-color);
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    .edit-card h1 {
        font-size: 24px;
        font-weight: 800;
        margin: 0 0 30px 0;
        color: var(--text-main);
    }

    .form-grid {
        display: grid;
        gap: 24px;
    }

    .field-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    label {
        font-size: 13px;
        font-weight: 700;
        color: #475569;
    }

    input[type="text"],
    input[type="url"],
    input[type="file"],
    textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.2s;
        background: #fff;
    }

    input:focus, textarea:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .links-section {
        background: #f1f5f9;
        padding: 20px;
        border-radius: 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .full-width { grid-column: span 2; }

    .current-image {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 10px;
        background: #f8fafc;
        border-radius: 10px;
        margin-bottom: 5px;
    }

    .btn-save {
        background: var(--primary);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 20px;
    }

    .btn-save:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
    }
</style>

<div class="edit-wrapper">
    <a href="{% url 'core:dashboard' %}" class="back-link">← Вернуться в кабинет</a>

    <div class="edit-card">
        <h1>Редактирование товара</h1>

        <form method="post" enctype="multipart/form-data" class="form-grid">
            {% csrf_token %}

            <div class="field-group">
                <label>Название продукта</label>
                <input type="text" name="name" value="{{ product.name }}" required>
            </div>

            <div class="field-group">
                <label>Категории</label>
                <input type="text" name="category" value="{{ product.category }}" placeholder="Напр: Консервы, Мясо">
            </div>

            <div class="links-section">
                <div class="field-group">
                    <label>Wildberries URL</label>
                    <input type="url" name="link_wb" value="{{ product.link_wb|default:'' }}">
                </div>
                <div class="field-group">
                    <label>Ozon URL</label>
                    <input type="url" name="link_ozon" value="{{ product.link_ozon|default:'' }}">
                </div>
                <div class="field-group full-width">
                    <label>Сайт бренда / Другое</label>
                    <input type="url" name="link_other" value="{{ product.link_other|default:'' }}">
                </div>
            </div>

            <div class="field-group">
                <label>Изображение товара</label>
                {% if product.image %}
                <div class="current-image">
                    <img src="{{ product.image.url }}" style="width: 40px; height: 40px; border-radius: 6px; object-fit: cover;">
                    <span style="font-size: 12px; color: #64748b;">Текущий файл загружен</span>
                </div>
                {% endif %}
                <input type="file" name="product_image" accept="image/*">
            </div>

            <div class="field-group">
                <label>Или ссылка на фото (URL)</label>
                <input type="url" name="avatar_url" value="{{ product.avatar_url|default:'' }}">
            </div>

            <div class="field-group">
                <label>ТЗ и пожелания для блогера</label>
                <textarea name="description" rows="6">{{ product.description }}</textarea>
            </div>

            <button type="submit" class="btn-save">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}
